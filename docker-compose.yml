services:
  # Banco de Dados
  postgres:
    image: postgres:16-alpine
    container_name: encurtei_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - encurtei_network

  # Cache
  redis:
    image: redis:alpine
    container_name: encurtei_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - encurtei_network

  # API NestJS
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encurtei_api
    restart: always
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - encurtei_network

networks:
  encurtei_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: